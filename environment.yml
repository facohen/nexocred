name: nexocred
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pytest
  - hypothesis
  - ruff
  - pyright
  - pydantic>=2
  - fastapi
  - sqlalchemy>=2
  - alembic
  - httpx
  - uvicorn
  - greenlet
  - pip:
      - pydantic-settings
      - asyncpg
      - psycopg[binary]
      - pyjwt
      - passlib[bcrypt]
      - bcrypt
      - python-multipart
      - pytest-asyncio
      - celery
      - fpdf2
